name: hydra
title: Hydra
summary: Inspect, explain, and safely plan Hydra-based experiment configuration workflows.
description: Use when a repo uses Hydra or OmegaConf and the task involves config groups, defaults lists, overrides, multirun planning, launcher setup, reproducibility, onboarding, scaffolding, or recovering the effective config that produced a run.
codex:
  display_name: Hydra
  short_description: Plan and debug Hydra config workflows
  default_prompt: Use $hydra to inspect this repo Hydra configuration and explain the effective run config.
use_when:
  - The user mentions hydra, omegaconf, defaults, multirun, --cfg, launcher, or sweeper.
  - The repo has conf/, configs/, @hydra.main, hydra.compose, or OmegaConf config groups.
  - The task is to explain effective config values, debug overrides, recover prior run settings, prepare a sweep command, or onboard Hydra into a new project.
avoid_when:
  - Generic training-loop debugging that does not depend on Hydra composition.
  - Hosted experiment tracking tasks that belong to W&B or MLflow.
  - Blind repo mutation. Use planning and preview-first flows unless the user explicitly asks to apply changes.
principles:
  - Inspect the local repo before assuming config roots, entrypoints, or launcher plugins.
  - Prefer composition and dry-run inspection before execution.
  - "Treat reproducibility as a first-class output: effective config, entrypoint, overrides, output directory, and checkpoint location."
  - Surface ambiguity explicitly when there are multiple config roots, entrypoints, or launchers.
safety_rules:
  - Prefer planning, preview, and dry-run commands before applying or executing anything.
  - Do not launch jobs or mutate a repo unless the user explicitly requests that action.
  - When scaffolding, keep preview as the default and require an explicit apply step for file writes.
expected_outputs:
  - the relevant entrypoint and config root
  - the defaults chain or config groups in play
  - the effective config or the exact path to it
  - the command to reproduce the run
  - a concrete onboarding or test plan when the repo is not yet Hydra-enabled
commands:
  - name: detect_hydra_project.py
    summary: Identify config roots, entrypoints, config groups, defaults files, and output-directory patterns.
  - name: render_effective_config.py
    summary: Build a dry-run Hydra command and optionally execute it with --cfg and --resolve.
  - name: find_run_config.py
    summary: Recover config provenance from a Hydra run directory and surface reproducibility gaps.
  - name: analyze_overrides.py
    summary: Classify override text into assignment, add, delete, and sweep patterns.
  - name: plan_multirun.py
    summary: Plan a Hydra multirun command and estimate sweep size when the CLI syntax is enumerable.
  - name: onboard_hydra_project.py
    summary: Inspect a repo and produce an onboarding plan for Hydra adoption.
  - name: scaffold_hydra_project.py
    summary: Preview or apply a minimal Hydra scaffold for a new project using current entrypoint defaults.
  - name: explain_value_origin.py
    summary: Trace a final config value back to config files and CLI overrides.
references:
  - path: references/workflow.md
    summary: Main inspection and planning workflow.
  - path: references/repo-discovery.md
    summary: Heuristics for finding Hydra usage in unfamiliar repos.
  - path: references/validation-checklist.md
    summary: Pre-launch and reproducibility checks.
  - path: references/onboarding.md
    summary: Recommended Hydra onboarding order and minimum validation plan.
workflows:
  - name: Explain a Hydra project
    helpers:
      - detect_hydra_project.py
      - render_effective_config.py
    steps:
      - Detect the config root and entrypoint.
      - List config groups and the defaults chain.
      - Render or reconstruct the effective config.
      - Explain which file or override controls the requested value.
  - name: Debug an override
    helpers:
      - analyze_overrides.py
      - render_effective_config.py
    steps:
      - Normalize the exact command the user ran.
      - Separate defaults selection from field assignment overrides.
      - Check for group-name mismatches, interpolation breakage, and missing + or ++.
      - Show the minimal corrected command and the resulting config delta.
  - name: Plan a sweep or multirun
    helpers:
      - analyze_overrides.py
      - plan_multirun.py
    steps:
      - Identify the target entrypoint, config name, and launcher mode.
      - Verify which parameters belong in Hydra sweep syntax versus application config.
      - Produce a readable launch plan with run naming, output layout, and failure points.
      - Do not submit the jobs unless the user explicitly asks.
  - name: Recover a previous run
    helpers:
      - find_run_config.py
    steps:
      - Locate the Hydra output directory or .hydra metadata.
      - Recover config.yaml, hydra.yaml, and overrides.yaml if present.
      - Reconstruct the original command and effective config.
      - Flag missing provenance such as code SHA, checkpoint path, or launcher metadata.
  - name: Onboard Hydra into a new project
    helpers:
      - onboard_hydra_project.py
      - scaffold_hydra_project.py
    steps:
      - Inspect the repo for likely training entrypoints, config directories, and framework conventions.
      - Produce a migration plan covering entrypoint wrapping, config-root layout, parameter migration, and output-directory conventions.
      - Preview a minimal scaffold rather than rewriting the project blindly.
      - Define a minimal validation sequence before any large refactor.
generic_adapter_note: |
  This adapter is a thin wrapper over the shared Hydra core. Prefer invoking the CLI helpers under core/hydra/scripts/ before writing custom reasoning or mutations.
