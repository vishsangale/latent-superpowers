name: experiment-discipline
title: Experiment Discipline
summary: Enforce methodological rigor in experiment design, logging, ablations, and baseline reporting.
description: Use when the task involves designing an experiment, deciding what metrics to track, setting up logging, selecting baselines, analyzing ablations, or reporting negative results.
codex:
  display_name: Experiment Discipline
  short_description: Enforce rigorous experiment methodologies
  default_prompt: Use $experiment-discipline to ensure eval-first design, correct ablations, and reproducibility.
use_when:
  - The user is starting a new feature branch or experiment and asking what code to write first.
  - The agent is generating training loops or tracking integration code.
  - The user reports an experiment that works, and the agent needs to verify why.
  - The agent must compare a new result against baselines.
avoid_when:
  - Purely software engineering refactors with no empirical component.
  - Doing raw metric math (use ablation-analysis directly instead).
principles:
  - Eval-first design — Build evaluation infrastructure before running experiments. Metrics and baselines defined upfront, not retrofitted.
  - Reproducibility by default — Log seeds, hyperparameters, hardware specs, and software versions. Every result should be re-runnable.
  - Ablation requirements — Don't claim a component helps without isolating its contribution. No "kitchen sink" results.
  - Baseline honesty — Compare against strong, recent baselines — not strawmen. State clearly when a proper baseline wasn't run and why.
  - Negative result reporting — Document what didn't work and why. Failed experiments carry as much signal as successful ones.
safety_rules:
  - Never recommend skipping baselines to save time.
  - Never generate a training loop without simultaneously demanding an evaluation strategy.
  - If the user provides a "kitchen sink" result, insist on an ablation before declaring victory.
expected_outputs:
  - Eval scripts and metric definitions proposed before training code.
  - Checklists of logged hyperparameters and seeds.
  - An isolated ablation plan for complex additions.
  - A clear comparison table featuring a strong baseline.
commands:
  - name: check_eval_first.py
    summary: Verifies that an evaluation strategy is specified before proceeding with training logic.
  - name: verify_reproducibility.py
    summary: Scans configuration for seed setting and environment tracking requirements.
  - name: enforce_baseline.py
    summary: Helper to prompt explicit baseline definition for any newly reported empirical result.
references:
  - path: references/eval-first.md
    summary: Best practices for implementing evals before training starts.
  - path: references/reproducibility-defaults.md
    summary: Checklists for what must be logged (seeds, hardware, env).
  - path: references/baselines-and-ablations.md
    summary: Rules for avoiding 'kitchen sink' claims and ensuring baseline honesty.
  - path: references/negative-results.md
    summary: Guidelines on valuing and documenting failed experiments.
workflows:
  - name: Design an experiment
    helpers:
      - check_eval_first.py
      - verify_reproducibility.py
    steps:
      - Force definition of evaluation metrics and baselines.
      - Ensure reproducibility metadata will be logged.
      - Proceed to training orchestration.
  - name: Report an empirical result
    helpers:
      - enforce_baseline.py
    steps:
      - Explicitly state the baseline.
      - Ensure an ablation separates compounded factors.
      - State clearly if it was a negative result.
generic_adapter_note: |
  This adapter wraps the experiment-discipline skill. Prefer applying these principles stringently before letting the user write empirical code.
