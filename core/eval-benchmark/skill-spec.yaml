name: eval-benchmark
title: Eval Benchmark
summary: Rank local runs, compare candidates against baselines, inspect metric histories, and generate concise benchmark reports across MLflow and W&B data.
description: Use when the task involves benchmarking local experiment runs, ranking models or configurations by explicit metrics, comparing candidate runs against a baseline, or inspecting evaluation histories and artifacts.
codex:
  display_name: Eval Benchmark
  short_description: Rank and compare local evaluation runs
  default_prompt: Use $eval-benchmark to rank local runs, compare a candidate to a baseline, and inspect evaluation histories for this project.
use_when:
  - The user wants a leaderboard, regression check, or compact benchmark report over local runs.
  - The task is to compare one run against another under explicit metrics and differing params.
  - The data lives in local MLflow stores, W&B offline runs, or local JSON artifacts logged by experiments.
avoid_when:
  - Raw sweep planning or execution work that belongs to experiment-runner.
  - Config composition questions that belong to Hydra.
  - Blind statistical significance claims without enough runs.
principles:
  - Make the ranking metric explicit and keep baseline or candidate selection concrete.
  - Separate summary metrics from full history inspection.
  - Surface differing params alongside metric deltas.
  - Treat missing history or artifact data as a real evaluation limitation.
safety_rules:
  - Prefer read-only inspection of local tracking stores and artifacts.
  - Do not rewrite run metadata or alter artifact contents.
  - Call out when comparisons mix sources or when histories are unavailable.
expected_outputs:
  - ranked runs under an explicit metric and direction
  - candidate versus baseline deltas for key metrics
  - history summaries with available metric keys and final values
  - a concise Markdown benchmark report for notes or docs
commands:
  - name: leaderboard.py
    summary: Build a local leaderboard across MLflow and W&B runs under an explicit metric.
  - name: compare_run_pair.py
    summary: Compare a candidate run against a baseline run, including metric deltas and differing params.
  - name: inspect_histories.py
    summary: Inspect per-run histories from MLflow artifacts or W&B offline data and summarize available metrics.
  - name: benchmark_report.py
    summary: Produce a compact Markdown benchmark report from local runs and optional baseline selection.
references:
  - path: references/workflow.md
    summary: Benchmark ranking, baseline comparison, and report-writing flow.
  - path: references/history-inspection.md
    summary: How history data is recovered from MLflow artifacts and W&B offline runs.
workflows:
  - name: Produce a benchmark leaderboard
    helpers:
      - leaderboard.py
      - benchmark_report.py
    steps:
      - Resolve the local MLflow and W&B run sources.
      - Choose the ranking metric and direction explicitly.
      - Rank runs and note varying parameters.
      - Generate a compact Markdown report for the top results.
  - name: Check whether a candidate regressed
    helpers:
      - compare_run_pair.py
      - inspect_histories.py
    steps:
      - Select explicit baseline and candidate run IDs.
      - Compare key metrics and differing params.
      - Inspect history data when available to distinguish early spikes from stable gains.
      - Surface missing artifacts or missing metrics instead of guessing.
generic_adapter_note: |
  This adapter is a thin wrapper over the shared eval-benchmark core. Prefer the shared benchmark helpers over ad hoc manual comparisons so local evaluation work stays explicit and repeatable.
