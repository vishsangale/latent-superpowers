name: local-dashboard
title: Local Dashboard
summary: Serve a local browser UI over MLflow, W&B, artifacts, shortlist comparisons, tradeoff views, and grouped experiment analysis without auth or external services.
description: Use when the task involves browsing local runs in a browser, comparing local MLflow and W&B data, previewing artifacts, refreshing local state, or giving a single-user local dashboard over experiment results without requiring hosted services or API keys.
codex:
  display_name: Local Dashboard
  short_description: Serve a no-auth local experiment dashboard
  default_prompt: Use $local-dashboard to inspect local MLflow and W&B runs in a browser, compare variants with explicit metric direction, preview artifacts, and refresh local state without external services.
use_when:
  - The user wants a local web UI over local experiment runs.
  - The task is to browse local MLflow and W&B data without auth or hosted dashboards.
  - The user wants run tables, grouped comparisons, artifact preview, tradeoff views, shortlist comparison, or project rollups from local files.
avoid_when:
  - Hosted W&B or MLflow server debugging.
  - Repository planning work that belongs to paper-to-code.
  - High-polish frontend design work. The dashboard should optimize for clarity and utility first.
principles:
  - Load local run data into one normalized shape before serving anything.
  - Keep the dashboard single-user, local-first, and zero-auth.
  - Prefer simple JSON APIs plus a static local frontend that can refresh local state safely.
  - Expose grouped comparison, shortlist comparison, tradeoff analysis, and artifact inspection directly in the UI.
safety_rules:
  - Prefer read-only local inspection.
  - Do not mutate runs, artifacts, or tracking stores.
  - State when sources are partial or when a data backend could not be loaded.
expected_outputs:
  - a local dashboard URL
  - source health and run counts
  - grouped comparison data for one explicit metric and direction
  - shortlist and tradeoff views over the current filtered slice
  - artifact listings plus preview or download for selected runs
commands:
  - name: index_runs.py
    summary: Load local MLflow and W&B sources and emit a normalized dashboard index.
  - name: serve_dashboard.py
    summary: Serve a local dashboard with JSON APIs and a browser UI for filtered runs, grouped comparisons, shortlist review, tradeoff views, refresh, and artifact preview.
references:
  - path: references/workflow.md
    summary: Local dashboard loading and serving flow.
  - path: references/data-model.md
    summary: The normalized run shape and API surface.
workflows:
  - name: Serve a local dashboard
    helpers:
      - index_runs.py
      - serve_dashboard.py
    steps:
      - Resolve local MLflow and W&B sources.
      - Build a normalized local run index.
      - Start the dashboard server on a chosen host and port.
      - Use the UI or JSON APIs to inspect runs, compare variants with explicit metric direction, review tradeoffs, and preview artifacts.
generic_adapter_note: |
  This adapter is a thin wrapper over the shared local-dashboard core. Prefer invoking the CLI helpers under the shared core before building ad-hoc local viewers.
